name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Helm Lint ────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.17.x"

      - name: Lint chart (local values)
        run: helm lint charts/forge -f charts/forge/values-local.yaml

      - name: Lint chart (UAT values)
        run: helm lint charts/forge -f charts/forge/values-uat.yaml --set api.image.tag=test --set web.image.tag=test

      - name: Lint chart (prod values)
        run: helm lint charts/forge -f charts/forge/values-prod.yaml --set api.image.tag=test --set web.image.tag=test

      - name: Render templates (dry-run)
        run: helm template forge charts/forge -f charts/forge/values-uat.yaml --set api.image.tag=test --set web.image.tag=test

  # ── API Typecheck & Build ────────────────────────────────────────────────────
  api-check:
    name: API — Typecheck & Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/api
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: apps/api
        run: pnpm typecheck

      - name: Docker build (no push — validation only)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          tags: forge/api:ci

  # ── Web Typecheck & Build ────────────────────────────────────────────────────
  web-check:
    name: Web — Typecheck & Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Docker build (no push — validation only)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: false
          tags: forge/web:ci
