apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edev.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "edev.name" . }}
    helm.sh/chart: {{ include "edev.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "edev.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "edev.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: bootstrap-openclaw-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              mkdir -p {{ .Values.runtime.configPath | quote }} {{ printf "%s/agents/main/agent" .Values.runtime.configPath | quote }}
              cp /bootstrap/openclaw.json {{ printf "%s/openclaw.json" .Values.runtime.configPath | quote }}
              cp /bootstrap-auth/auth-profiles.json {{ printf "%s/agents/main/agent/auth-profiles.json" .Values.runtime.configPath | quote }}
              chmod 600 {{ printf "%s/openclaw.json" .Values.runtime.configPath | quote }} {{ printf "%s/agents/main/agent/auth-profiles.json" .Values.runtime.configPath | quote }} || true
          volumeMounts:
            - name: state
              mountPath: {{ .Values.runtime.configPath | quote }}
              subPath: .openclaw
            - name: config
              mountPath: /bootstrap/openclaw.json
              subPath: openclaw.json
            - name: auth
              mountPath: /bootstrap-auth/auth-profiles.json
              subPath: auth-profiles.json
      containers:
        - name: edev
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.runtime.command }}
          ports:
            - containerPort: {{ .Values.runtime.gateway.port }}
              name: gateway
          env:
            - name: OPENCLAW_WORKSPACE
              value: {{ .Values.runtime.workspacePath | quote }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.gatewayTokenSecretName | quote }}
                  key: {{ .Values.secrets.gatewayTokenKey | quote }}
            {{- if eq .Values.model.provider "openai" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.credentials.secretName | quote }}
                  key: {{ .Values.model.credentials.key | quote }}
            {{- else if eq .Values.model.provider "gemini" }}
            - name: GOOGLE_GENERATIVE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.credentials.secretName | quote }}
                  key: {{ .Values.model.credentials.key | quote }}
            {{- end }}
            {{- if .Values.telegram.enabled }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telegram.secretName | quote }}
                  key: {{ .Values.telegram.tokenKey | quote }}
            {{- end }}
            {{- range $name, $value := .Values.runtime.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.runtime.workspacePath | quote }}
              subPath: workspace
            - name: state
              mountPath: {{ .Values.runtime.configPath | quote }}
              subPath: .openclaw
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "edev.fullname" . }}-state
        {{- else }}
        - name: state
          emptyDir: {}
        {{- end }}
        - name: config
          configMap:
            name: {{ include "edev.fullname" . }}-config
        - name: auth
          secret:
            secretName: {{ include "edev.fullname" . }}-auth
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
