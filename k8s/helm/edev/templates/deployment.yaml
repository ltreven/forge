apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edev.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "edev.name" . }}
    helm.sh/chart: {{ include "edev.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "edev.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "edev.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: bootstrap-edev
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - /bootstrap/bootstrap.sh
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            {{- if eq .Values.model.provider "openai" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.secretName | quote }}
                  key: {{ .Values.model.key | quote }}
            {{- else if or (eq .Values.model.provider "gemini") (eq .Values.model.provider "google") }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.secretName | quote }}
                  key: {{ .Values.model.key | quote }}
            {{- end }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telegram.secretName | quote }}
                  key: {{ .Values.telegram.tokenKey | quote }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtime.gateway.secretName | quote }}
                  key: {{ .Values.runtime.gateway.tokenKey | quote }}
            - name: ACTIVE_PROVIDER
              value: {{ .Values.model.provider | quote }}
            - name: AGENT_OPERATOR_NAME
              value: {{ .Values.profile.operatorName | quote }}
            - name: AGENT_PROFILE
              value: {{ .Values.profile.type | quote }}
            - name: AGENT_NAME
              value: {{ .Values.profile.agentName | quote }}
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: bootstrap
              mountPath: /bootstrap
            {{- if .Values.profile.configMapName }}
            - name: profile-files
              mountPath: /profile-files
              readOnly: true
            {{- end }}
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: edev
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: {{ .Values.runtime.gateway.port }}
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            {{- if eq .Values.model.provider "openai" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.secretName | quote }}
                  key: {{ .Values.model.key | quote }}
            {{- else if or (eq .Values.model.provider "gemini") (eq .Values.model.provider "google") }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.secretName | quote }}
                  key: {{ .Values.model.key | quote }}
            {{- end }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telegram.secretName | quote }}
                  key: {{ .Values.telegram.tokenKey | quote }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtime.gateway.secretName | quote }}
                  key: {{ .Values.runtime.gateway.tokenKey | quote }}
            - name: ACTIVE_PROVIDER
              value: {{ .Values.model.provider | quote }}
            - name: AGENT_OPERATOR_NAME
              value: {{ .Values.profile.operatorName | quote }}
            - name: AGENT_PROFILE
              value: {{ .Values.profile.type | quote }}
            - name: AGENT_NAME
              value: {{ .Values.profile.agentName | quote }}
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: {{ include "edev.fullname" . }}-state
        - name: bootstrap
          configMap:
            name: {{ include "edev.fullname" . }}-bootstrap
            defaultMode: 0755
        {{- if .Values.profile.configMapName }}
        - name: profile-files
          configMap:
            name: {{ .Values.profile.configMapName | quote }}
        {{- end }}
        - name: tmp-volume
          emptyDir: {}
