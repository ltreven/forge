apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edev.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "edev.name" . }}
    helm.sh/chart: {{ include "edev.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "edev.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "edev.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: edev
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.runtime.command }}
          ports:
            - containerPort: {{ .Values.runtime.gateway.port }}
              name: gateway
          env:
            - name: OPENCLAW_WORKSPACE
              value: {{ .Values.runtime.workspacePath | quote }}
            - name: OPENCLAW_CONFIG_DIR
              value: {{ .Values.runtime.configPath | quote }}
            - name: OPENCLAW_GATEWAY_PORT
              value: {{ .Values.runtime.gateway.port | quote }}
            - name: OPENCLAW_GATEWAY_BIND
              value: {{ .Values.runtime.gateway.bind | quote }}
            - name: MODEL_PROVIDER
              value: {{ .Values.model.provider | quote }}
            - name: MODEL_ID
              value: {{ .Values.model.name | quote }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.gatewayTokenSecretName | quote }}
                  key: {{ .Values.secrets.gatewayTokenKey | quote }}
            {{- if eq .Values.model.provider "openai" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.credentials.secretName | quote }}
                  key: {{ .Values.model.credentials.key | quote }}
            {{- else if or (eq .Values.model.provider "gemini") (eq .Values.model.provider "google") }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.model.credentials.secretName | quote }}
                  key: {{ .Values.model.credentials.key | quote }}
            {{- end }}
            {{- if .Values.telegram.enabled }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telegram.secretName | quote }}
                  key: {{ .Values.telegram.tokenKey | quote }}
            {{- end }}
            {{- range $name, $value := .Values.runtime.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.runtime.workspacePath }}
            - name: state
              mountPath: {{ .Values.runtime.configPath }}
              subPath: .openclaw
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "edev.fullname" . }}-state
        {{- else }}
        - name: state
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
