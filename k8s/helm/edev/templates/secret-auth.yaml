apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edev.fullname" . }}-auth
  labels:
    app.kubernetes.io/name: {{ include "edev.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  auth-profiles.json: |
    {
      "profiles": {
        {{- if eq .Values.model.provider "openai" }}
        "openai:default": {
          "provider": "openai",
          "mode": "api_key",
          "apiKey": "${OPENAI_API_KEY}"
        }
        {{- else if eq .Values.model.provider "gemini" }}
        "google:default": {
          "provider": "google",
          "mode": "api_key",
          "apiKey": "${GOOGLE_GENERATIVE_AI_API_KEY}"
        }
        {{- end }}
      }
    }
