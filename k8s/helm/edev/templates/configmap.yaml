apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edev.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "edev.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  openclaw.json: |
    {
      "auth": {
        "profiles": {
          "openai:default": {
            "provider": "openai",
            "mode": "api_key"
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": {{ .Values.provider.model | quote }}
          },
          "models": {
            {{ .Values.provider.model | quote }}: {
              "alias": "{{ .Values.provider.alias }}"
            }
          },
          "workspace": {{ .Values.runtime.workspacePath | quote }}
        }
      },
      "tools": {
        "profile": "coding"
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "gateway": {
        "mode": "local",
        "port": {{ .Values.runtime.gateway.port }},
        "bind": {{ .Values.runtime.gateway.bind | quote }},
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        }
      }
    }
