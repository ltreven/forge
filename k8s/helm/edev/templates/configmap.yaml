apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edev.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "edev.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  openclaw.json: |
    {
      "auth": {
        "profiles": {
          {{- if eq .Values.model.provider "openai" }}
          "openai:default": {
            "provider": "openai",
            "mode": "api_key"
          }
          {{- else if eq .Values.model.provider "gemini" }}
          "google:default": {
            "provider": "google",
            "mode": "api_key"
          }
          {{- end }}
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": {{ .Values.model.name | quote }}
          },
          "models": {
            {{ .Values.model.name | quote }}: {
              "alias": "{{ .Values.model.alias }}"
            }
          },
          "workspace": {{ .Values.runtime.workspacePath | quote }}
        }
      },
      "tools": {
        "profile": "coding"
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "gateway": {
        "mode": "local",
        "port": {{ .Values.runtime.gateway.port }},
        "bind": {{ .Values.runtime.gateway.bind | quote }},
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        }
      }
    }
