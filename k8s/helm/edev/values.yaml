replicaCount: 1

image:
  repository: ghcr.io/ltreven/edev
  tag: latest
  pullPolicy: IfNotPresent

profile:
  name: software-engineer
  operatorName: Lourenço

model:
  provider: openai
  name: openai/gpt-5.4
  alias: GPT
  credentials:
    secretName: ""
    key: OPENAI_API_KEY

runtime:
  workspacePath: /home/node/workspace
  configPath: /home/node/.openclaw
  gateway:
    port: 18789
    bind: loopback
  command:
    - openclaw
    - gateway
    - run
    - --allow-unconfigured
  hardening:
    enabled: true
  extraEnv:
    NODE_OPTIONS: --max-old-space-size=2048
    OPENCLAW_GATEWAY_NAME: "eDEV K8s"

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""

resources:
  requests:
    cpu: 250m
    memory: 2048Mi
  limits:
    cpu: "1"
    memory: 4Gi

service:
  type: ClusterIP
  port: 18789

telegram:
  enabled: false
  secretName: ""
  tokenKey: TELEGRAM_BOT_TOKEN

linear:
  enabled: false
  credentials:
    secretName: ""
    key: LINEAR_API_KEY

secrets:
  gatewayTokenSecretName: ""
  gatewayTokenKey: OPENCLAW_GATEWAY_TOKEN

stateMirror:
  enabled: false
  repositoryUrl: ""
  branch: main
  credentialsSecretName: ""

nodeSelector: {}
tolerations: []
affinity: {}
