replicaCount: 1

image:
  repository: ghcr.io/openclaw/openclaw
  tag: 2026.4.9
  pullPolicy: IfNotPresent

profile:
  agentName: ""
  type: ""
  operatorName: ""
  configMapName: ""

model:
  provider: ""
  name: ""
  secretName: ""
  key: ""

runtime:
  workspacePath: /home/node/workspace
  configPath: /home/node/.openclaw
  gateway:
    port: 18789
    bind: loopback
    secretName: ""
    tokenKey: OPENCLAW_GATEWAY_TOKEN
  hardening:
    enabled: true
  extraEnv:
    NODE_OPTIONS: --max-old-space-size=2048
    OPENCLAW_GATEWAY_NAME: "eDEV K8s"

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""

resources:
  requests:
    cpu: 250m
    memory: 2048Mi
  limits:
    cpu: "1"
    memory: 4Gi

service:
  type: ClusterIP
  port: 18789

telegram:
  enabled: false
  secretName: ""
  tokenKey: TELEGRAM_BOT_TOKEN

linear:
  enabled: false
  credentials:
    key: ""

stateMirror:
  enabled: false
  repositoryUrl: ""
  branch: main
  credentialsSecretName: ""

nodeSelector: {}
tolerations: []
affinity: {}
