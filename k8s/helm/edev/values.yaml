replicaCount: 1

image:
  repository: ghcr.io/openclaw/openclaw
  tag: latest
  pullPolicy: IfNotPresent

profile:
  name: edev

provider:
  name: openai
  model: openai/gpt-5.4

runtime:
  workspacePath: /home/node/workspace
  configPath: /home/node/.openclaw
  gateway:
    port: 18789
    bind: loopback
  command:
    - openclaw
    - gateway
    - run
    - --allow-unconfigured

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  port: 18789

telegram:
  enabled: false
  secretName: ""
  tokenKey: TELEGRAM_BOT_TOKEN

secrets:
  gatewayTokenSecretName: ""
  gatewayTokenKey: OPENCLAW_GATEWAY_TOKEN
  providerSecretName: ""
  providerKeyName: OPENAI_API_KEY

stateMirror:
  enabled: false
  repositoryUrl: ""
  branch: main
  credentialsSecretName: ""

nodeSelector: {}
tolerations: []
affinity: {}
