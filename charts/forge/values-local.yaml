# ── Local Development Overrides (docker-desktop) ──────────────────────────────
# Used by: tilt up, helm install ... -f values-local.yaml

namespace: forge

api:
  replicaCount: 1
  image:
    repository: forge/api
    tag: local         # built by Tilt from apps/api/Dockerfile
    pullPolicy: Never  # never pull — always use local image built by Tilt
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "200m"
      memory: 256Mi
  env:
    NODE_ENV: development
    PORT: "4000"
    CORS_ORIGIN: "http://forge.localhost,http://localhost:3000"
    # JWT_SECRET inline for local dev only (not a real secret)
    JWT_SECRET: "forge-local-dev-secret-change-in-prod"
  # No existingSecret in local — DATABASE_URL is built from embedded PostgreSQL
  existingSecret: ""
  # Disable migration init container until --migrate-only flag is implemented
  runMigrations: false

web:
  replicaCount: 1
  image:
    repository: forge/web
    tag: local
    pullPolicy: Never
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "200m"
      memory: 256Mi
  env:
    NODE_ENV: development
    PORT: "3000"
    # Server-side: Next.js pod calls forge-api via ClusterIP (pod-to-pod, internal)
    API_INTERNAL_URL: "http://forge-api:4000"
    # Client-side: browser calls /api/* on the same origin → Next.js rewrites to API_INTERNAL_URL
    NEXT_PUBLIC_API_URL: "/api"


ingress:
  enabled: true
  className: nginx
  host: forge.localhost
  tls:
    enabled: false

postgresql:
  embedded: true
  password: forge_local_only
  persistence:
    enabled: true
    size: 2Gi

networkPolicy:
  # Disable NetworkPolicy locally — Docker Desktop doesn't enforce them well
  enabled: false

controller:
  enabled: true
  replicaCount: 1   # single replica locally (no need for HA)
  image:
    repository: forge/controller
    tag: local
    pullPolicy: Never

