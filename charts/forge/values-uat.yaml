# ── UAT Environment Overrides ─────────────────────────────────────────────────
# Used by: helm upgrade --install forge charts/forge -f values-uat.yaml \
#            --set api.image.tag=$GIT_SHA --set web.image.tag=$GIT_SHA

namespace: forge-uat

api:
  replicaCount: 1
  image:
    repository: ghcr.io/ltreven/forge-api
    tag: ""             # injected by CI: --set api.image.tag=$GIT_SHA
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi
  env:
    NODE_ENV: production
    PORT: "4000"
    CORS_ORIGIN: "https://forge-uat.example.com"
  # Secret must be pre-created in the cluster by the ops team / Terraform
  existingSecret: forge-api-uat-secret
  runMigrations: true

web:
  replicaCount: 1
  image:
    repository: ghcr.io/ltreven/forge-web
    tag: ""
    pullPolicy: Always
  env:
    NODE_ENV: production
    PORT: "3000"
    NEXT_PUBLIC_API_URL: "https://forge-uat.example.com/api"

ingress:
  enabled: true
  className: nginx     # managed by Terraform in target cluster
  host: forge-uat.example.com   # CHANGE: update to actual UAT hostname
  tls:
    enabled: true
    secretName: forge-uat-tls
    certManager:
      enabled: true
      clusterIssuer: letsencrypt-staging   # use staging issuer for UAT

postgresql:
  embedded: false       # Use managed DB (RDS / Cloud SQL / Neon)
  # Connection string injected via forge-api-uat-secret (DATABASE_URL key)

networkPolicy:
  enabled: true

imagePullSecrets:
  - name: ghcr-pull-secret   # must exist in namespace (created by Terraform/ops)
