# ── Global ────────────────────────────────────────────────────────────────────
# These are the base defaults. Override via values-local.yaml / values-uat.yaml / values-prod.yaml

nameOverride: ""
fullnameOverride: ""

namespace: forge
adminNamespace: forge-admin

# ── Forge API (Application Plane) ───────────────────────────────────────────
forgeApi:
  enabled: true
  replicaCount: 1

  image:
    repository: forge/forge-api
    tag: "latest"
    pullPolicy: IfNotPresent

  # Port the Express server listens on
  port: 4000

  service:
    type: ClusterIP
    port: 4000

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

  # Environment variables injected from a Kubernetes Secret.
  # The secret must be created separately (see charts/forge/templates/api/SECRETS.md)
  existingSecret: ""

  env:
    NODE_ENV: production
    PORT: "4000"
    # In Kubernetes, ClusterIP Services route traffic via pod IP — not loopback.
    # HOST=0.0.0.0 is required for pod-to-pod communication via the Service.
    # Security boundary: NetworkPolicy (only forge-web can reach forge-api) + no external Ingress.
    # The code default (127.0.0.1) applies in bare-metal dev only (outside k8s).
    HOST: "0.0.0.0"
    # DATABASE_URL and JWT_SECRET must come from the secret referenced by existingSecret


  # Run Drizzle migrations as an init container before the API starts.
  # DISABLED: requires --migrate-only flag in apps/forge-api/src/index.ts (not yet implemented).
  # When implemented, re-enable here and in values-local.yaml.
  runMigrations: false

  # Liveness / readiness probes
  # Use exec (curl on loopback) — not httpGet — because the API binds to 127.0.0.1
  # per the security policy. httpGet probes use the pod IP which cannot reach loopback.
  livenessProbe:
    exec:
      command:
        - sh
        - -c
        - curl -sf http://127.0.0.1:4000/health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

  readinessProbe:
    exec:
      command:
        - sh
        - -c
        - curl -sf http://127.0.0.1:4000/health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# ── Admin API ─────────────────────────────────────────────────────────────────
adminApi:
  enabled: true
  replicaCount: 1

  image:
    repository: forge/admin-api
    tag: "latest"
    pullPolicy: IfNotPresent

  # Port the Express server listens on
  port: 4001

  service:
    type: ClusterIP
    port: 4001

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

  # Environment variables injected from a Kubernetes Secret.
  existingSecret: ""

  env:
    NODE_ENV: production
    ADMIN_PORT: "4001"
    HOST: "0.0.0.0"

  runMigrations: false

  livenessProbe:
    exec:
      command:
        - sh
        - -c
        - curl -sf http://127.0.0.1:4001/health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

  readinessProbe:
    exec:
      command:
        - sh
        - -c
        - curl -sf http://127.0.0.1:4001/health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# ── Forge Web (Client Portal) ────────────────────────────────────────────────
forgeWeb:
  enabled: true
  replicaCount: 1

  image:
    repository: forge/forge-web
    tag: "latest"
    pullPolicy: IfNotPresent

  port: 3000

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

  env:
    NODE_ENV: production
    PORT: "3000"

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 20
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10

# ── Admin Web (Marketing/Admin Portal) ───────────────────────────────────────
adminWeb:
  enabled: true
  replicaCount: 1

  image:
    repository: forge/admin-web
    tag: "latest"
    pullPolicy: IfNotPresent

  port: 3001

  service:
    type: ClusterIP
    port: 3001

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

  env:
    NODE_ENV: production
    PORT: "3001"

  livenessProbe:
    httpGet:
      path: /
      port: 3001
    initialDelaySeconds: 20
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 10

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: forge.localhost
  tls:
    enabled: false
    secretName: forge-tls
    certManager:
      enabled: false
      clusterIssuer: letsencrypt-prod

  annotations: {}

# ── PostgreSQL (embedded — for local/dev only) ────────────────────────────────
postgresql:
  # Set to true to deploy PostgreSQL as a StatefulSet inside the cluster.
  # Set to false in UAT/Prod and provide externalConnectionString via a Secret.
  embedded: true

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  database: forge
  username: forge

  # For embedded mode: the password is stored in a generated secret.
  # Do NOT use this in production — use externalConnectionString via a Secret instead.
  password: forge_local_only

  port: 5432

  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

# ── Network Policies ──────────────────────────────────────────────────────────
networkPolicy:
  # Enforce strict ingress/egress rules on the API pod.
  # The API is only reachable from the web pod — never from outside the cluster.
  enabled: true

# ── Image Pull Secrets (for ghcr.io or private registries) ───────────────────
imagePullSecrets: []
# - name: ghcr-pull-secret

# ── Agent Controller ──────────────────────────────────────────────────────────
controller:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/ltreven/forge-controller
    tag: "latest"
    pullPolicy: IfNotPresent

  # Image the controller injects as the main agent container.
  agentImage: "ghcr.io/ltreven/forge-agent:latest"
  agentImagePullPolicy: "IfNotPresent"

  # Image the controller injects as the forge-consumer sidecar.
  consumerImage: "ghcr.io/ltreven/forge-consumer:latest"
  consumerImagePullPolicy: "IfNotPresent"

# ── RabbitMQ ─────────────────────────────────────────────────────────────────
rabbitmq:
  enabled: true

  # Name of the RabbitmqCluster CR applied in infra-messaging namespace.
  clusterName: forge-rabbit

  # Replicas: 1 for local dev, 3 for UAT/prod (override in values-*.yaml).
  replicas: 1

  # Internal cluster hostname (used by API and consumer sidecar).
  # Pattern: <clusterName>.<namespace>.svc.cluster.local
  host: forge-rabbit.infra-messaging.svc.cluster.local
  amqpPort: 5672
  managementPort: 15672

  # Admin credentials — set per-environment.
  # In local dev, the password is inlined in values-local.yaml.
  # In prod, reference an existing Secret (adminPasswordSecretRef).
  adminUser: admin
  adminPassword: ""    # overridden per-env

  persistence:
    storage: 10Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi
