apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.forge.ai
  annotations:
    # Upgraded via helm upgrade; do NOT delete manually.
    helm.sh/resource-policy: keep
spec:
  group: forge.ai
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - fa
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          jsonPath: .status.phase
          type: string
        - name: Profile
          jsonPath: .spec.profile
          type: string
        - name: Agent
          jsonPath: .spec.agentName
          type: string
        - name: Age
          jsonPath: .metadata.creationTimestamp
          type: date
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - agentName
                - profile
                - credentialsSecretRef
              properties:
                # ── Identity ──────────────────────────────────────────────────
                agentName:
                  type: string
                  description: "Human-readable name of the agent (e.g. Alice)"
                profile:
                  type: string
                  description: "Agent role profile. Maps to /opt/forge/profiles/{profile}/ inside the image."
                  enum:
                    - software_engineer
                    - product_manager
                    - software_architect
                    - team_lead
                operatorName:
                  type: string
                  description: "Name of the human operator this agent works for"
                teamName:
                  type: string
                  description: "Name of the team this agent belongs to"
                teamId:
                  type: string
                  description: "ID of the team this agent belongs to"
                # ── Credentials ───────────────────────────────────────────────
                credentialsSecretRef:
                  type: string
                  description: "Name of the Secret in the same namespace containing all agent credentials"
                # ── Model ─────────────────────────────────────────────────────
                model:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum: [openai, gemini, google]
                    name:
                      type: string
                      description: "Model name (e.g. gpt-5.4, gemini-2.5-flash)"
                # ── Resources ─────────────────────────────────────────────────
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                # ── Persistence ───────────────────────────────────────────────
                persistence:
                  type: object
                  properties:
                    size:
                      type: string
                      default: "10Gi"
                    storageClassName:
                      type: string
                # ── Image override (optional) ──────────────────────────────────
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                    tag:
                      type: string
                    pullPolicy:
                      type: string
                      enum: [Always, IfNotPresent, Never]
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  description: "Pending | Provisioning | Running | Failed"
                podName:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:        { type: string }
                      status:      { type: string }
                      reason:      { type: string }
                      message:     { type: string }
                      lastTransitionTime: { type: string, format: date-time }
