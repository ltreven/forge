{{- if .Values.adminApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: forge-admin-api
  namespace: {{ .Values.adminNamespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- include "forge.adminApi.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.adminApi.service.type }}
  ports:
    - port: {{ .Values.adminApi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "forge.adminApi.selectorLabels" . | nindent 4 }}
{{- end }}
