{{- if .Values.adminApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-admin-api
  namespace: {{ .Values.adminNamespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- include "forge.adminApi.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.adminApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "forge.adminApi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forge.adminApi.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: admin-api
          image: "{{ .Values.adminApi.image.repository }}:{{ .Values.adminApi.image.tag }}"
          imagePullPolicy: {{ .Values.adminApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminApi.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.adminApi.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.adminApi.existingSecret }}
            - name: DATABASE_URL_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminApi.existingSecret }}
                  key: DATABASE_URL_ADMIN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminApi.existingSecret }}
                  key: JWT_SECRET
            {{- else if .Values.postgresql.embedded }}
            - name: DATABASE_URL_ADMIN
              value: {{ include "forge.postgresql.adminConnectionString" . | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.adminApi.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.adminApi.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.adminApi.resources | nindent 12 }}
{{- end }}
