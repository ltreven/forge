{{- if .Values.controller.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-agent-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: forge-agent-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forge-agent-controller
  labels:
    app.kubernetes.io/name: forge-agent-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # ── ForgeAgent CRs — watch + patch status ─────────────────────────────────
  - apiGroups: ["forge.ai"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["forge.ai"]
    resources: ["agents/status"]
    verbs: ["get", "update", "patch"]
  # ── Child resources — reconcile (create/update/delete via ownerRef GC) ─────
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "configmaps", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ── Events — for kubectl describe output ──────────────────────────────────
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # ── Leader Election — Lease object in forge namespace ─────────────────────
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forge-agent-controller
  labels:
    app.kubernetes.io/name: forge-agent-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forge-agent-controller
subjects:
  - kind: ServiceAccount
    name: forge-agent-controller
    namespace: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-agent-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: forge-agent-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  # Two replicas — only one leads (leader election via Lease).
  # If the leader pod dies, the other assumes leadership within seconds.
  replicas: {{ .Values.controller.replicaCount | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-agent-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-agent-controller
    spec:
      serviceAccountName: forge-agent-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --leader-election-namespace={{ .Values.namespace }}
            - --api-base-url=http://forge-api:{{ .Values.api.port }}
            - --agent-image={{ .Values.controller.agentImage | default "ghcr.io/ltreven/forge-agent:latest" }}
            - --agent-image-pull-policy={{ .Values.controller.agentImagePullPolicy | default "IfNotPresent" }}
          env:
            - name: DEBUG
              value: "false"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
{{- end }}
