{{- if and .Values.rabbitmq.enabled (not .Values.tiltDeploy) }}
# ── RabbitMQ Cluster CR ───────────────────────────────────────────────────────
# Reconciled by the RabbitMQ Cluster Operator (installed separately via Helm).
# NOTE: In Tilt local dev, this CR is applied directly from the Tiltfile (not here)
# to avoid CRD-not-found errors during helm template rendering.
# In production (helm upgrade), the Operator is pre-installed, so this CR works fine.
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: {{ .Values.rabbitmq.clusterName }}
  namespace: infra-messaging
  labels:
    app.kubernetes.io/managed-by: forge
    forge.ai/component: message-bus
spec:
  replicas: {{ .Values.rabbitmq.replicas }}
  persistence:
    storage: {{ .Values.rabbitmq.persistence.storage }}
    storageClassName: {{ .Values.rabbitmq.persistence.storageClassName | quote }}
  rabbitmq:
    additionalPlugins:
      - rabbitmq_management
      - rabbitmq_prometheus
    additionalConfig: |
      default_vhost = /
      log.console = true
  resources:
    requests:
      cpu: {{ .Values.rabbitmq.resources.requests.cpu }}
      memory: {{ .Values.rabbitmq.resources.requests.memory }}
    limits:
      cpu: {{ .Values.rabbitmq.resources.limits.cpu }}
      memory: {{ .Values.rabbitmq.resources.limits.memory }}
{{- end }}
