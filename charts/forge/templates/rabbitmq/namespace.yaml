{{- if .Values.rabbitmq.enabled }}
# ── RabbitMQ Namespace ────────────────────────────────────────────────────────
# Shared infra namespace for the RabbitMQ cluster.
# Intentionally separate from forge-app so it can be shared across environments.
apiVersion: v1
kind: Namespace
metadata:
  name: infra-messaging
  labels:
    app.kubernetes.io/managed-by: forge
    forge.ai/component: message-bus
{{- end }}
