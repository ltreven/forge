{{- if .Values.postgresql.embedded }}
apiVersion: v1
kind: Service
metadata:
  name: forge-postgresql
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- include "forge.postgresql.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "forge.postgresql.selectorLabels" . | nindent 4 }}
{{- end }}
