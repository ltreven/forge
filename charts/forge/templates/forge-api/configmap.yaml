{{- if .Values.forgeApi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-api-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
data:
  # Non-sensitive configuration only.
  # Secrets (DATABASE_URL, JWT_SECRET) are injected via the Secret referenced
  # by api.existingSecret in values.yaml.
  NODE_ENV: {{ .Values.forgeApi.env.NODE_ENV | quote }}
  PORT: {{ .Values.forgeApi.env.PORT | quote }}
{{- if index .Values.forgeApi.env "CORS_ORIGIN" }}
  CORS_ORIGIN: {{ index .Values.forgeApi.env "CORS_ORIGIN" | quote }}
{{- end }}
{{- end }}
