{{- if .Values.forgeApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- include "forge.forgeApi.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.forgeApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "forge.forgeApi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forge.forgeApi.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: forge-api
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.forgeApi.runMigrations }}
      initContainers:
        - name: run-migrations
          image: "{{ .Values.forgeApi.image.repository }}:{{ .Values.forgeApi.image.tag }}"
          imagePullPolicy: {{ .Values.forgeApi.image.pullPolicy }}
          command: ["node", "dist/index.js", "--migrate-only"]
          env:
            {{- range $key, $value := .Values.forgeApi.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.forgeApi.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.forgeApi.existingSecret }}
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.forgeApi.existingSecret }}
                  key: JWT_SECRET
            {{- else if .Values.postgresql.embedded }}
            - name: DATABASE_URL
              value: {{ include "forge.postgresql.connectionString" . | quote }}
            {{- end }}
      {{- end }}

      containers:
        - name: api
          image: "{{ .Values.forgeApi.image.repository }}:{{ .Values.forgeApi.image.tag }}"
          imagePullPolicy: {{ .Values.forgeApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.forgeApi.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.forgeApi.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.forgeApi.existingSecret }}
            {{- /* UAT/Prod: credentials come from a pre-existing Kubernetes Secret */}}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.forgeApi.existingSecret }}
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.forgeApi.existingSecret }}
                  key: JWT_SECRET
            {{- else if .Values.postgresql.embedded }}
            {{- /* Local: DATABASE_URL built from embedded PostgreSQL values */}}
            {{- /* JWT_SECRET is already injected above via the env range loop */}}
            - name: DATABASE_URL
              value: {{ include "forge.postgresql.connectionString" . | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.forgeApi.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.forgeApi.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.forgeApi.resources | nindent 12 }}
{{- end }}

