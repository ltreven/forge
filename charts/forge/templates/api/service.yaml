{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: forge-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- include "forge.api.selectorLabels" . | nindent 4 }}
spec:
  # ClusterIP only — the API is never exposed externally.
  # Access from outside the cluster is blocked by design (no Ingress + NetworkPolicy).
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "forge.api.selectorLabels" . | nindent 4 }}
{{- end }}
