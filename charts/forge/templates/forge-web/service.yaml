{{- if .Values.forgeWeb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: forge-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    {{- include "forge.forgeWeb.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.forgeWeb.service.type }}
  ports:
    - port: {{ .Values.forgeWeb.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "forge.forgeWeb.selectorLabels" . | nindent 4 }}
{{- end }}
