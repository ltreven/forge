# ── Production Environment Overrides ─────────────────────────────────────────
# Used by: helm upgrade --install forge charts/forge -f values-prod.yaml \
#            --set api.image.tag=$GIT_SHA --set web.image.tag=$GIT_SHA

namespace: forge-prod

api:
  replicaCount: 2      # HA — 2 replicas in prod
  image:
    repository: ghcr.io/ltreven/forge-api
    tag: ""             # injected by CI: --set api.image.tag=$GIT_SHA
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    NODE_ENV: production
    PORT: "4000"
    CORS_ORIGIN: "https://forge.example.com"
  # Secret must be pre-created in the cluster by the ops team / Terraform
  existingSecret: forge-api-prod-secret
  runMigrations: false  # Run migrations as a separate, gated step in CI/CD in prod

web:
  replicaCount: 2
  image:
    repository: ghcr.io/ltreven/forge-web
    tag: ""
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    NODE_ENV: production
    PORT: "3000"
    NEXT_PUBLIC_API_URL: "https://forge.example.com/api"

ingress:
  enabled: true
  className: nginx       # managed by Terraform in target cluster
  host: forge.example.com  # CHANGE: update to actual production hostname
  tls:
    enabled: true
    secretName: forge-prod-tls
    certManager:
      enabled: true
      clusterIssuer: letsencrypt-prod   # production Let's Encrypt

postgresql:
  embedded: false         # Use managed DB (RDS / Cloud SQL / Neon)
  # Connection string injected via forge-api-prod-secret (DATABASE_URL key)

networkPolicy:
  enabled: true

imagePullSecrets:
  - name: ghcr-pull-secret   # must exist in namespace (created by Terraform/ops)

# ── RabbitMQ production ────────────────────────────────────────────────────────
# RabbitMQ Cluster Operator must be pre-installed in the target cluster.
# Admin credentials come from the `forge-rabbit-default-user` Secret (auto-created
# by the Operator) or a manually created Secret referenced here.
rabbitmq:
  enabled: true
  replicas: 3           # HA: 3-node quorum
  adminUser: admin
  # adminPassword: set via Terraform / ops Secret — do NOT inline here
  persistence:
    storage: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

