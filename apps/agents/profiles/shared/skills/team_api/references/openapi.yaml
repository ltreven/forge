openapi: 3.0.0
info:
  title: Forge Team Management API
  version: 1.0.0
  description: Internal API for agents to inspect their team and provision new agents.

servers:
  - url: http://forge-api.forge.svc.cluster.local:4000
    description: Internal cluster URL

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Team:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        name: { type: string }
        icon: { type: string, nullable: true }
        mission: { type: string, nullable: true }
        waysOfWorking: { type: string, nullable: true }
        template: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Agent:
      type: object
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [team_lead, software_engineer, product_manager, software_architect] }
        icon: { type: string, nullable: true }
        k8sStatus: { type: string, enum: [pending, provisioning, running, failed, terminated] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateAgentRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string, description: "Display name of the agent" }
        type: { type: string, enum: [team_lead, software_engineer, product_manager, software_architect] }
        icon: { type: string, description: "Emoji icon" }
        metadata:
          type: object
          properties:
            avatarColor: { type: string, description: "Hex color code" }
            personality: { type: string }
            identity: { type: string }
            longTermMemory: { type: string }
            model: { type: string, description: "LLM model to use (optional)" }

security:
  - bearerAuth: []

paths:
  /team-management/teams/mine:
    get:
      summary: Get current team metadata
      responses:
        200:
          description: Team metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Team' }

  /team-management/teams/mine/agents:
    get:
      summary: List all agents in the team
      responses:
        200:
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Agent' }
    post:
      summary: Create a new agent in the team
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAgentRequest' }
      responses:
        201:
          description: Agent created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
