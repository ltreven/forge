openapi: 3.0.0
info:
  title: Forge Project Management API
  version: 1.1.0
  description: Internal API for managing high-level projects and individual kanban tasks.

servers:
  - url: http://forge-api.forge.svc.cluster.local:4000
    description: Internal cluster URL

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Project:
      type: object
      required: [title]
      description: "A high-level container for multiple issues. Use for major features."
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        title: { type: string }
        shortSummary: { type: string }
        descriptionMarkdown: { type: string }
        status: 
          type: integer
          enum: [0, 1, 2, 3, 4, 5]
          description: "0=backlog, 1=todo, 2=in_progress, 3=in_review, 4=done, 5=cancelled"
        priority:
          type: integer
          enum: [0, 1, 2, 3, 4]
          description: "0=none, 1=low, 2=medium, 3=high, 4=urgent"
        leadId: { type: string, format: uuid, description: "Agent ID (must be in your team)" }
        health: { type: string, enum: [unknown, on_track, at_risk, off_track] }

    ProjectIssue:
      type: object
      required: [title]
      description: "A specific task belonging to a parent project folder."
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        parentIssueId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        shortSummary: { type: string }
        descriptionMarkdown: { type: string }
        status: 
          type: integer
          enum: [0, 1, 2, 3, 4, 5]
          description: "0=backlog, 1=todo, 2=in_progress, 3=in_review, 4=done, 5=cancelled"
        priority:
          type: integer
          enum: [0, 1, 2, 3, 4]
          description: "0=none, 1=low, 2=medium, 3=high, 4=urgent"
        assignedToId: { type: string, format: uuid, description: "Agent ID (must be in your team)" }

    TeamTask:
      type: object
      required: [title]
      description: "A standalone individual work item on the team kanban board. Use for most tasks."
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        parentTaskId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        shortSummary: { type: string }
        descriptionMarkdown: { type: string }
        status: 
          type: integer
          enum: [0, 1, 2, 3, 4, 5]
          description: "0=backlog, 1=todo, 2=in_progress, 3=in_review, 4=done, 5=cancelled"
        priority:
          type: integer
          enum: [0, 1, 2, 3, 4]
          description: "0=none, 1=low, 2=medium, 3=high, 4=urgent"
        assignedToId: { type: string, format: uuid, description: "Agent ID (must be in your team)" }

    ProjectHealthUpdate:
      type: object
      required: [newHealth, reason]
      properties:
        newHealth: { type: string, enum: [on_track, at_risk, off_track] }
        reason: { type: string }

security:
  - bearerAuth: []

paths:
  /tasks:
    get:
      summary: List team kanban tasks (individual work)
    post:
      summary: Create a team kanban task (individual work)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamTask' }

  /projects:
    get:
      summary: List major project folders
    post:
      summary: Create a major project folder (organization only)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Project' }

  /projects/{id}:
    get:
      summary: Get project details
    put:
      summary: Update project folder
    delete:
      summary: Delete project folder

  /projects/{id}/issues:
    get:
      summary: List issues inside this project
    post:
      summary: Create an issue inside this project
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectIssue' }

  /issues/{id}:
    get:
      summary: Get issue details
    put:
      summary: Update project issue
    delete:
      summary: Delete project issue

  /activities:
    get:
      summary: View team activity feed
