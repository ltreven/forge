- type: "product-delivery"
  name: "Product Delivery Team"
  description: "Team of engineers and product manager working on building and maintaining the product"
  mission: "Deliver high-quality software to users on time and on budget"
  waysOfWorking: "We follow an agile workflow with clear iterations. We emphasize code review, comprehensive testing, and clear documentation."
  coreCapabilities:
    - name: "Plan Feature Development"
      inputsDescription: "User story and acceptance criteria"
      outputsDescription: "Task for engineering"
      executableBy: ["product-manager"]
      requiredSkills: ["write-user-story"]
      suggestedNextCapabilities:
        - "Assign Feature Task"
    - name: "Assign Feature Task"
      inputsDescription: "Feature task"
      outputsDescription: "Task assigned to engineering"
      executableBy: ["team-lead"]
      requiredSkills: ["assign-task"]
      suggestedNextCapabilities:
        - "Develop Feature"
    - name: "Develop Feature"
      inputsDescription: "Feature task"
      outputsDescription: "Code change or implementation"
      executableBy: ["engineer"]
      requiredSkills: ["write-code", "test-code"]
      suggestedNextCapabilities:
        - "Review Code"
    - name: "Review Code"
      inputsDescription: "Code change and test results"
      outputsDescription: "Review comments and approval"
      executableBy: ["engineer"]
      requiredSkills: ["review-code"]
      suggestedNextCapabilities:
        - "Deploy Feature"